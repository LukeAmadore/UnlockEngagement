// ── CONTROLLER ──
var C = {
  pick:function(k){S.init(k);R.go();},

  startY0:function(){
    S.phase='game';S.qPhase='decision';
    S.sit=null;
    for(var i=0;i<SITS.length;i++){if(SITS[i].q===1){S.sit=SITS[i];break;}}
    R.go();
  },

  skipY0:function(){S.year=0;S.nextBudget=BASE_BUDGETS[S.diff]||40000;C.beginNextYear();},

  choose:function(sitId,optId){
    AUDIO.init();
    S.resolveOpt(sitId,optId);
    R.go();
  },

  toggleNode:function(id){
    S.toggleSel(id);
    R.go();
  },

  commitInvestments:function(){
    S.commitSel();
    this.goToResolve();
  },

  skipBuild:function(){
    S.sel={};
    this.goToResolve();
  },

  goToResolve:function(){
    // Guards against a double-tap (or any double-fire) on Invest/Skip re-running
    // genAmbient/applyQueued a second time for the same quarter — without this,
    // a fast double-tap could apply the same ambient event and trust delta twice.
    if(S.qPhase==='resolve')return;
    S.genAmbient();
    S.genPulse();
    // Stagnation check runs before applyQueued so its penalty (if any) is summed into the
    // same single per-quarter trust delta, instead of clamping separately afterward.
    S.checkStagnation();
    S.applyQueued();
    S.qPhase='resolve';
    R.go();
    setTimeout(function(){R.processUnlocks();},100);
    setTimeout(function(){var a=R.$('rc-main');if(a)a.classList.add('show');},80);
    setTimeout(function(){var p=R.$('rc-pulse');if(p)p.classList.add('show');},900);
  },

  advance:function(){
    if(S.q<4){
      S.q++;
      S.sitDone=false;S.sel={};S.qCons=[];S.qTree=[];
      S.ambEv=null;S.pulse=null;S.pulseV=null;S.capUsed=0;
      S.trustAtQStart=S.trust;
      S.sit=null;
      if(S.year===0){
        for(var i=0;i<SITS.length;i++){if(SITS[i].q===S.q){S.sit=SITS[i];break;}}
      } else {
        S.sit=S.yearDraw[S.q-1]||null;
      }
      S.qPhase='decision';
      R.go();
    } else {
      S.phase='presurvey';R.go();
    }
  },

  choosePreSurvey:function(optId){
    var ps=S.getPreSurvey(S.year);
    if(!ps)return;
    var opt=null;
    for(var j=0;j<ps.opts.length;j++){if(ps.opts[j].id===optId){opt=ps.opts[j];break;}}
    if(!opt)return;
    if(opt.effect.part)S.part=S.clamp100(S.part+opt.effect.part);
    if(opt.effect.trust)S.applyCappedTrust(opt.effect.trust);
    if(opt.bud)S.spendBud(opt.bud);
    var note=opt.effect.note||'';
    if(opt.effect.part)note+=' (Participation '+(opt.effect.part>0?'+':'')+opt.effect.part+')';
    if(opt.effect.trust)note+=' (Trust '+(opt.effect.trust>0?'+':'')+opt.effect.trust+')';
    S.preSurveyNote=note;
    if(S.year===0){S.phase='reveal';R.go();}else{C.goPostSurvey();}
  },

  skipPreSurvey:function(){
    if(S.year===0){S.phase='reveal';R.go();}else{C.goPostSurvey();}
  },

  goPostSurvey:function(){
    var g=calcGrade(S.ap,S.part,S.eng);
    S.grade=g;
    S.nextBudget=calcNextBudget(S.diff,S.year+1,g,S.getZone().id,S.budget);
    var trustShift={S:10,A:7,B:4,C:1,D:-2,F:-5};
    var shift=trustShift[g]||0;
    S.applyCappedTrust(shift);
    // Resolve pending recommendations from last year
    var zone=S.getZone().id;
    var landProb=REC_LAND_PROB[zone]||0.45;
    S.recResults=[];
    for(var ri=0;ri<S.pendingRecs.length;ri++){
      var rec=S.pendingRecs[ri];
      var probMod=rec.probMod||1.0;
      var landed=rec.guaranteed||Math.random()<(landProb*probMod);
      var signal=rec.signal||'medium';
      var result={dim:rec.dim,landed:landed,year:rec.year,signal:signal};
      S.recResults.push(result);
      for(var di=0;di<REC_DIMENSIONS.length;di++){
        if(REC_DIMENSIONS[di].id!==rec.dim)continue;
        var d=REC_DIMENSIONS[di];
        if(landed){
          if(signal==='low'){
            // Low-signal rec: lands superficially but no real score movement, small trust dip next quarter
            S.adjTrust(-1);
            result.trustDip=true;
          } else {
            if(d.score==='ap')S.ap=Math.min(100,S.ap+d.delta);
            else if(d.score==='part')S.part=Math.min(100,S.part+d.delta);
            else if(d.score==='eng')S.eng=Math.min(100,S.eng+d.delta);
            S.applyCappedTrust(2);
            S.polcap=Math.min(100,S.polcap+3);
            result.scoreLabel=SCORE_LABELS[d.score];
            result.scoreDelta=d.delta;
            result.trustGain=2;
            result.pcGain=3;
          }
        } else if(signal==='high'||signal==='medium'){
          // A real, data-supported problem got deprioritized. The organization feels this
          // later — queued as a one-time ambient event next year (see S.genAmbient).
          S.recFallout.push({dim:rec.dim,signal:signal,queuedQ:Math.floor(Math.random()*4)+1});
          result.deferredFallout=true;
        }
        break;
      }
    }
    S.yearHistory.push({year:S.year,ap:S.ap,part:S.part,eng:S.eng,grade:g});
    S.pendingRecs=[];
    S.recsIssued=0;
    S.phase='postsurvey';R.go();
    setTimeout(function(){AUDIO.gradeReveal(g);},300);
  },

  startYear:function(){
    var d=DIFF[S.diff];
    S.year=1;S.q=1;S.isTut=false;
    // Full reset to difficulty base values - tutorial was orientation only
    S.trust=d.trust;S.ap=d.ap;S.part=d.part;S.eng=d.eng;
    S.polcap=d.polcap;S.cap=d.cap;
    // Tree resets - Year 1 starts fresh
    S.tree={};
    S.budget=S.nextBudget||d.budget;
    S.capUsed=0;S.sel={};S.qCons=[];S.qTree=[];
    S.ambEv=null;S.pulse=null;S.pulseV=null;
    S.trustAtQStart=S.trust;S.grade=null;S.preSurveyNote='';S.recSkippedNote='';
    S.apAtYearStart=S.ap;S.partAtYearStart=S.part;S.engAtYearStart=S.eng;
    S.yearTrustGained=0;
    S.drawYearSituations(1);
    S.sit=S.yearDraw[0]||null;
    S.qPhase='decision';S.phase='game';
    R.go();
  },

  beginNextYear:function(){
    if(S.year===0){this.startYear();return;}
    // Year 2+: budget resets (sticky from grade), scores/trust/tree all carry forward
    S.year++;S.q=1;
    S.budget=S.nextBudget;
    S.capUsed=0;S.sel={};S.qCons=[];S.qTree=[];
    S.ambEv=null;S.pulse=null;S.pulseV=null;
    S.trustAtQStart=S.trust;S.grade=null;S.preSurveyNote='';S.recSkippedNote='';
    S.apAtYearStart=S.ap;S.partAtYearStart=S.part;S.engAtYearStart=S.eng;
    S.yearTrustGained=0;
    S.drawYearSituations(S.year);
    S.sit=S.yearDraw[0]||null;
    S.qPhase='decision';S.phase='game';
    R.go();
  },

  goY1:function(){C.goPostSurvey();},
  goToClosing:function(){S.phase='closing';R.go();},
  issueRec:function(dimId){
    if(S.recsIssued>=2)return;
    for(var i=0;i<S.pendingRecs.length;i++){if(S.pendingRecs[i].dim===dimId)return;}
    var signal=getRecDiagnostic(dimId,S.ap,S.part,S.year,S.tree);
    var tier=REC_TIERS[signal];
    if(S.polcap<tier.cost)return;
    S.polcap=Math.max(0,S.polcap-tier.cost);
    var guaranteed=S.guaranteedRec;
    if(guaranteed)S.guaranteedRec=false;
    S.pendingRecs.push({dim:dimId,year:S.year,signal:signal,probMod:tier.probMod,guaranteed:guaranteed,cost:tier.cost});
    S.recsIssued++;
    R.go();
  },
  unissueRec:function(dimId){
    // Lets the player change their mind before the year locks in — refunds the
    // exact PC spent and restores a consumed guaranteeNextRec trade, if any.
    for(var i=0;i<S.pendingRecs.length;i++){
      if(S.pendingRecs[i].dim!==dimId)continue;
      var rec=S.pendingRecs[i];
      S.polcap=Math.min(100,S.polcap+(rec.cost||0));
      if(rec.guaranteed)S.guaranteedRec=true;
      S.pendingRecs.splice(i,1);
      S.recsIssued--;
      break;
    }
    R.go();
  },
  skipRecs:function(){
    // Explicit skip - bank PC, show flavor note
    S.recSkippedNote='You held your capital. The signal was not strong enough to act on yet.';
    R.go();
  },
  restart:function(){S.phase='diff';R.go();},
  toggleTrending:function(){S.showTrending=!S.showTrending;R.go();},
  toggleSound:function(){
    S.soundOn=!S.soundOn;
    AUDIO.init();
    var btn=document.getElementById('snd-btn');
    if(btn)btn.textContent=S.soundOn?'🔊 Sound':'🔇 Sound';
    if(S.soundOn)AUDIO.nodeClick(); // little confirmation ping
  },
  showHelp:function(){
    // Guide overlay reuses the onboarding content, without its Start Year 1 /
    // tutorial buttons (those only make sense before the game has started).
    var overlay=document.createElement('div');
    overlay.id='help-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:24px';
    overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
    var obHTML=R.onboardContent(false);
    var box=document.createElement('div');
    box.style.cssText='max-width:680px;width:100%;background:var(--bg);border-radius:12px;padding:8px;position:relative';
    box.innerHTML='<button onclick="document.getElementById(\'help-overlay\').remove()" style="position:absolute;top:12px;right:12px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--t2);font-size:12px;padding:4px 10px;cursor:pointer;font-family:var(--sans);z-index:1">Close &#10005;</button>'+obHTML;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  },

  openCompany:function(){R.companyModal();},
  closeCompany:function(e){
    if(e&&e.target&&e.target.id!=='company-modal')return;
    var m=R.$('company-modal');if(m)m.remove();
  },
  openTree:function(){R.treeModal(S.qPhase==='build');},
  toggleTreeDetails:function(trackId){
    S.treeDetailsOpen[trackId]=!S.treeDetailsOpen[trackId];
    // Re-render whichever tree view is actually on screen: the modal if it's open,
    // otherwise the normal game screen (which includes the inline build-phase tree).
    if(R.$('tree-modal'))R.treeModal(S.qPhase==='build');
    else R.go();
  },
  closeTree:function(e){
    if(e&&e.target&&e.target.id!=='tree-modal')return;
    var m=R.$('tree-modal');if(m)m.remove();
  },

  mobToggle:function(){
    S.mobPanelOpen=!S.mobPanelOpen;
    R.go();
  }
};

R.go();

// ============================================================
// SOUND SYSTEM - Web Audio API, no external files
// Three sounds: ambient zone drone, grade reveal sting, node build click
// Toggle with S.soundOn
// ============================================================
var AUDIO = {
  ctx: null,
  init: function(){
    if(this.ctx)return;
    try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  },
  resume: function(){
    if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();
  },
  // Short click for tree node build
  nodeClick: function(){
    if(!S.soundOn||!this.ctx)return;
    this.resume();
    var o=this.ctx.createOscillator();
    var g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);
    o.frequency.setValueAtTime(440,this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880,this.ctx.currentTime+0.05);
    g.gain.setValueAtTime(0.15,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.15);
    o.start();o.stop(this.ctx.currentTime+0.15);
  },
  // Grade reveal sting - varies by grade
  gradeReveal: function(grade){
    if(!S.soundOn||!this.ctx)return;
    this.resume();
    var freqs={S:[523,659,784],A:[440,554,659],B:[392,494,587],C:[349,440,523],D:[294,370,440],F:[261,330,392]};
    var f=freqs[grade]||freqs['C'];
    var now=this.ctx.currentTime;
    f.forEach(function(freq,i){
      var o=AUDIO.ctx.createOscillator();
      var gn=AUDIO.ctx.createGain();
      o.connect(gn);gn.connect(AUDIO.ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(freq,now+i*0.12);
      gn.gain.setValueAtTime(0,now+i*0.12);
      gn.gain.linearRampToValueAtTime(0.12,now+i*0.12+0.05);
      gn.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.4);
      o.start(now+i*0.12);
      o.stop(now+i*0.12+0.4);
    });
  },
  // Trust zone ambient tone - subtle, one-shot on zone change
  zoneShift: function(zoneId){
    if(!S.soundOn||!this.ctx)return;
    this.resume();
    var tones={skeptical:180,cautious:220,building:250,engaged:280,champion:350};
    var freq=tones[zoneId]||220;
    var o=this.ctx.createOscillator();
    var g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(freq,this.ctx.currentTime);
    g.gain.setValueAtTime(0,this.ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.06,this.ctx.currentTime+0.3);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+1.5);
    o.start();o.stop(this.ctx.currentTime+1.5);
  }
};

</script>
